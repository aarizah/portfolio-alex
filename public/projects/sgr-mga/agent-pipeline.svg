  <text x="80" y="558" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600">STEP 7 PARALLEL REVIEWERS</text>
  <text x="80" y="576" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Coherence · Population · Alternatives · Supports</text>
  <path d="M336 516 V532" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrBlue)"/>

  <!-- Phase 3 -->
  <text x="64" y="620" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">PHASE 3 — EVALUATION &amp; SGR</text>
  <line x1="64" y1="628" x2="712" y2="628" stroke="#27272a" stroke-width="1"/>

  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="64" y="644" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="76" y="664" fill="#3b82f6" font-size="10" font-weight="600">10</text>
    <text x="68" y="682" fill="#e4e4e7" font-size="11">Ex-ante</text>

    <rect x="156" y="644" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="168" y="664" fill="#3b82f6" font-size="10" font-weight="600">11</text>
    <text x="158" y="682" fill="#e4e4e7" font-size="11">SGR matrix</text>

    <rect x="248" y="644" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="260" y="664" fill="#3b82f6" font-size="10" font-weight="600">12</text>
    <text x="254" y="682" fill="#e4e4e7" font-size="11">MGA Web</text>
  </g>
  <g stroke="#3f3f46" stroke-width="1.5" marker-end="url(#arr)">
