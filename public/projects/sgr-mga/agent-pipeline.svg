  <text x="48" y="292" fill="#52525b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em">PIPELINE (STEPS 0–14)</text>

  <rect x="48" y="304" width="680" height="580" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <!-- Phase 1 -->
  <text x="64" y="332" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">PHASE 1 — INPUT &amp; IDENTIFICATION</text>
  <line x1="64" y1="340" x2="712" y2="340" stroke="#27272a" stroke-width="1"/>

  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="64" y="356" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="76" y="376" fill="#3b82f6" font-size="10" font-weight="600">0</text>
    <text x="72" y="394" fill="#e4e4e7" font-size="11">Preflight</text>

    <rect x="156" y="356" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="168" y="376" fill="#3b82f6" font-size="10" font-weight="600">1</text>
    <text x="172" y="394" fill="#e4e4e7" font-size="11">Intake</text>

    <rect x="248" y="356" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="260" y="376" fill="#3b82f6" font-size="10" font-weight="600">2</text>
    <text x="252" y="394" fill="#e4e4e7" font-size="11">Problems</text>

    <rect x="340" y="356" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="352" y="376" fill="#3b82f6" font-size="10" font-weight="600">3</text>
    <text x="340" y="394" fill="#e4e4e7" font-size="11">Objectives</text>
  </g>
  <g stroke="#3f3f46" stroke-width="1.5" marker-end="url(#arr)">
    <path d="M136 380 H152"/><path d="M228 380 H244"/><path d="M320 380 H336"/>
  </g>

  <!-- Phase 2 -->
  <text x="64" y="444" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">PHASE 2 — MGA PREPARATION</text>
  <line x1="64" y1="452" x2="712" y2="452" stroke="#27272a" stroke-width="1"/>

  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="64" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="76" y="488" fill="#3b82f6" font-size="10" font-weight="600">4</text>
    <text x="74" y="506" fill="#e4e4e7" font-size="11">Needs</text>

    <rect x="144" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="156" y="488" fill="#3b82f6" font-size="10" font-weight="600">5</text>
    <text x="148" y="506" fill="#e4e4e7" font-size="11">Technical</text>

    <rect x="224" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="236" y="488" fill="#3b82f6" font-size="10" font-weight="600">6</text>
    <text x="226" y="506" fill="#e4e4e7" font-size="11">Value ch.</text>

    <rect x="304" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="316" y="488" fill="#3b82f6" font-size="10" font-weight="600">7</text>
    <text x="306" y="506" fill="#e4e4e7" font-size="11">MGA str.</text>

    <rect x="384" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="396" y="488" fill="#3b82f6" font-size="10" font-weight="600">8</text>
    <text x="396" y="506" fill="#e4e4e7" font-size="11">Risks</text>

    <rect x="464" y="468" width="64" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="476" y="488" fill="#3b82f6" font-size="10" font-weight="600">9</text>
    <text x="464" y="506" fill="#e4e4e7" font-size="11">Program</text>
  </g>
