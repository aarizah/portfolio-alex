    <rect x="64" y="748" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="76" y="768" fill="#3b82f6" font-size="10" font-weight="600">13</text>
    <text x="62" y="786" fill="#e4e4e7" font-size="11">Gap review</text>

    <rect x="156" y="748" width="72" height="48" rx="4" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
    <text x="168" y="768" fill="#3b82f6" font-size="10" font-weight="600">14</text>
    <text x="152" y="786" fill="#e4e4e7" font-size="11">Maturation</text>
  </g>
  <path d="M136 772 H152" stroke="#3f3f46" stroke-width="1.5" marker-end="url(#arr)"/>

