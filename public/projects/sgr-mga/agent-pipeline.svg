<svg width="1200" height="1040" viewBox="0 0 1200 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1040" fill="#09090b"/>

  <!-- Title -->
  <text x="48" y="44" fill="#fafafa" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600" letter-spacing="-0.02em">SGR/MGA formulation pipeline</text>
  <text x="48" y="72" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">15 deterministic steps · canon read-only · artifacts in project/</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#52525b"/>
    </marker>
    <marker id="arrBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ── System layers ── -->
  <text x="48" y="108" fill="#52525b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em">ORCHESTRATION</text>

  <rect x="48" y="120" width="1104" height="132" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <!-- Formulador -->
  <rect x="72" y="152" width="128" height="68" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
  <text x="88" y="176" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">FORMULADOR</text>
  <text x="88" y="196" fill="#e4e4e7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Case input</text>
  <text x="88" y="212" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Perfil / Prefact.</text>

  <!-- Runner -->
  <rect x="248" y="144" width="200" height="84" rx="6" fill="#09090b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="268" y="168" fill="#3b82f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">ORCHESTRATOR</text>
  <text x="268" y="188" fill="#fafafa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500">sgr-mga-runner</text>
  <text x="268" y="208" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">invoke task · verify artifacts</text>
  <text x="268" y="222" fill="#52525b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">does not read canon or write artifacts</text>

  <!-- Canon -->
  <rect x="496" y="152" width="160" height="68" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
  <text x="516" y="176" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">CANON</text>
  <text x="516" y="196" fill="#e4e4e7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">knowledge/</text>
  <text x="516" y="212" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">read-only · SGR · MGA</text>

  <!-- Artifacts -->
  <rect x="696" y="152" width="160" height="68" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
  <text x="716" y="176" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">ARTIFACTS</text>
  <text x="716" y="196" fill="#e4e4e7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">project/</text>
  <text x="716" y="212" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">write zone · 00 → 09</text>

  <!-- Subagents -->
  <rect x="896" y="152" width="232" height="68" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="1"/>
  <text x="916" y="176" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">SUBAGENTS</text>
  <text x="916" y="196" fill="#e4e4e7" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">25 configured agents</text>
  <text x="916" y="212" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">15 steps · 4 reviewers · aux</text>

  <!-- Layer arrows -->
  <path d="M200 186 H244" stroke="#52525b" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M448 186 H492" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="456" y="178" fill="#3b82f6" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">task</text>
  <path d="M656 186 H692" stroke="#52525b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="662" y="178" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">write</text>
  <path d="M656 152 L656 140 L920 140 L920 150" stroke="#52525b" stroke-width="1" stroke-dasharray="3 3" fill="none" marker-end="url(#arr)"/>
  <text x="760" y="134" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">read canon</text>

