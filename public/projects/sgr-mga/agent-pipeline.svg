  <text x="64" y="724" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" letter-spacing="0.08em">PHASE 4 — REVIEW &amp; PLAN</text>
  <line x1="64" y1="732" x2="712" y2="732" stroke="#27272a" stroke-width="1"/>

