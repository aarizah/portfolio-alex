  <path d="M100 588 V642" stroke="#27272a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>
  <path d="M100 692 V746" stroke="#27272a" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr)"/>

  <!-- ── Artifact outputs (right column) ── -->
  <text x="752" y="292" fill="#52525b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em">KEY OUTPUTS</text>

  <rect x="752" y="304" width="400" height="580" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#a1a1aa">
    <text x="768" y="336" fill="#71717a" font-size="10" font-weight="600" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="0.06em">PHASE 1</text>
    <text x="768" y="358">00_input/elegibilidad_sgr_preliminar.md</text>
    <text x="768" y="378">01_intake/contexto_proyecto.md</text>
    <text x="768" y="398">02_identificacion/arbol_problemas.md</text>
    <text x="768" y="418">02_identificacion/arbol_objetivos_y_alternativas.md</text>

    <text x="768" y="456" fill="#71717a" font-size="10" font-weight="600" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="0.06em">PHASE 2</text>
    <text x="768" y="478">03_preparacion/estudio_necesidades.md</text>
    <text x="768" y="498">03_preparacion/analisis_tecnico.md</text>
    <text x="768" y="518">03_preparacion/cadena_valor.md</text>
    <text x="768" y="538">03_preparacion/estructura_mga.md</text>
    <text x="768" y="558">03_preparacion/riesgos_beneficios.md</text>
    <text x="768" y="578">04_programacion/*.md</text>

    <text x="768" y="616" fill="#71717a" font-size="10" font-weight="600" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="0.06em">PHASE 3</text>
    <text x="768" y="638">05_evaluacion/evaluacion_ex_ante_alcance.md</text>
    <text x="768" y="658">06_mga_web/ruta_operativa_no_automatizada_mga_web.md</text>
    <text x="768" y="678">07_sgr/matriz_requisitos.md</text>

    <text x="768" y="716" fill="#71717a" font-size="10" font-weight="600" font-family="ui-sans-serif, system-ui, sans-serif" letter-spacing="0.06em">PHASE 4</text>
    <text x="768" y="738">08_revision/reporte_hallazgos.md</text>
    <text x="768" y="758">09_plan/plan_maduracion.md</text>
    <text x="768" y="778" fill="#52525b" font-size="10">_logs/decisiones_y_trazabilidad.md</text>
  </g>

  <!-- ── Footer: governance ── -->
  <rect x="48" y="908" width="1104" height="96" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>

  <text x="64" y="936" fill="#fafafa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600">Pipeline halts when</text>
  <text x="64" y="958" fill="#a1a1aa" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Missing critical input · critical finding without human decision · phase mixing · actor absent · invented data detected</text>

  <text x="64" y="984" fill="#52525b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10">Field states: provisto · inferido · supuesto · vacio · no_aplica · no_verificado_en_canon</text>

  <text x="720" y="936" fill="#71717a" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600">Scale path</text>
  <text x="720" y="958" fill="#52525b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">Agent runtime → LangGraph DAG when flow is repeatable and volume demands it</text>
</svg>
